<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#178BCA">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Δόσεις">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Δόσεις Πιστωτικών</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f8fa;--surface:#ffffff;--surface2:#f0f2f5;
  --text:#1a1a2e;--text2:#5a6478;--text3:#9aa0ae;
  --blue:#178BCA;--blue-bg:#e8f4fb;--blue-txt:#0c5a8a;
  --green:#1D9E75;--green-bg:#e4f5ef;--green-txt:#0d6b4f;
  --amber:#BA7517;--amber-bg:#fdf3e3;--amber-txt:#7a4d0e;
  --red:#c0392b;--red-bg:#fdecea;--red-txt:#8b2119;
  --border:#e4e7ed;--radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --font:'Segoe UI',system-ui,sans-serif
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#242736;
    --text:#e8eaf0;--text2:#8890a4;--text3:#555e72;
    --blue:#2fa8e8;--blue-bg:#0e2a3d;--blue-txt:#7dcef7;
    --green:#25c48f;--green-bg:#0b2d22;--green-txt:#6de0b8;
    --amber:#e09c2a;--amber-bg:#2d1f07;--amber-txt:#f5c96a;
    --red:#e05c52;--red-bg:#2d100e;--red-txt:#f5897f;
    --border:#2a2f3f;--shadow:0 1px 3px rgba(0,0,0,.3)
  }
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:80px}
.top{background:var(--surface);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0) 16px 0;position:sticky;top:0;z-index:50}
.top-inner{display:flex;align-items:center;justify-content:space-between;height:56px}
.top h1{font-size:17px;font-weight:600;color:var(--text)}
.top h1 span{color:var(--blue)}
.add-fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+16px);right:16px;width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(23,139,202,.4);z-index:60;transition:transform .15s}
.add-fab:active{transform:scale(.93)}
.content{padding:16px;max-width:700px;margin:0 auto}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric-value{font-size:20px;font-weight:600;color:var(--text)}
.metric-value.danger{color:var(--red)}
.metric-value.info{color:var(--blue)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px}
.bank-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.bank-head{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:12px;user-select:none}
.bank-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.bank-info{flex:1;min-width:0}
.bank-name{font-size:15px;font-weight:600;color:var(--text)}
.bank-sub{font-size:12px;color:var(--text3);margin-top:1px}
.bank-totals{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.bank-tot-val{font-size:14px;font-weight:600;color:var(--text)}
.bank-tot-val.danger{color:var(--red)}
.bank-tot-label{font-size:10px;color:var(--text3);text-align:right}
.chevron{color:var(--text3);font-size:12px;transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.bank-body{border-top:1px solid var(--border)}
.card-section{border-bottom:1px solid var(--border)}
.card-section:last-child{border-bottom:none}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface2)}
.card-head-name{font-size:13px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:6px}
.card-head-rem{font-size:12px;color:var(--text3)}
.inst-item{padding:13px 16px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:flex-start}
.inst-icon{width:36px;height:36px;border-radius:8px;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.inst-main{flex:1;min-width:0}
.inst-store{font-size:13px;font-weight:600;color:var(--text)}
.inst-product{font-size:12px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inst-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;gap:8px;flex-wrap:wrap}
.inst-amt{font-size:17px;font-weight:700;color:var(--red)}
.inst-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:6px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.badge.ok{background:var(--green-bg);color:var(--green-txt)}
.badge.warn{background:var(--amber-bg);color:var(--amber-txt)}
.badge.danger{background:var(--red-bg);color:var(--red-txt)}
.badge.info{background:var(--blue-bg);color:var(--blue-txt)}
.prog-wrap{margin-top:8px}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px}
.prog{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.inst-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:background .15s}
.icon-btn:active{background:var(--surface2)}
.icon-btn.del{color:var(--red)}
.card-add-btn{display:flex;align-items:center;gap:6px;width:100%;padding:10px 16px;background:none;border:none;color:var(--blue);font-size:13px;cursor:pointer;border-top:1px solid var(--border)}
.bank-add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:none;border:2px dashed var(--border);border-radius:var(--radius);color:var(--text3);font-size:14px;cursor:pointer;margin-bottom:14px}
.bank-add-btn:active{background:var(--surface)}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:0 0 env(safe-area-inset-bottom,16px);width:100%;max-width:600px;max-height:92dvh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
.modal-head h2{font-size:17px;font-weight:600;color:var(--text)}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:none;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.modal-body{padding:0 20px 20px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px}
.fg input,.fg select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:15px;outline:none;-webkit-appearance:none}
.fg input:focus,.fg select:focus{border-color:var(--blue)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;padding:0 20px 8px}
.btn{flex:1;padding:13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;font-weight:500;cursor:pointer}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn:active{opacity:.85}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
</style>
</head>
<body>

<div class="top">
  <div class="top-inner">
    <h1>💳 <span>Δόσεις</span> Πιστωτικών</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="inst-count" style="font-size:13px;color:var(--text3)"></div>
      <button onclick="importJSON()" title="Εισαγωγή δεδομένων από αρχείο JSON" style="display:flex;align-items:center;gap:5px;font-size:13px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-weight:500">📂</button>
      <button onclick="exportJSON()" title="Εξαγωγή δεδομένων σε αρχείο JSON" style="display:flex;align-items:center;gap:5px;font-size:13px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--blue-bg);color:var(--blue-txt);cursor:pointer;font-weight:500">💾 JSON</button>
      <button onclick="exportExcel()" style="display:flex;align-items:center;gap:5px;font-size:13px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--green-bg);color:var(--green-txt);cursor:pointer;font-weight:500">📊 Excel</button>
    </div>
  </div>
</div>

<div class="content">
  <div class="summary-grid" id="summary"></div>
  <div id="banks"></div>
  <button class="bank-add-btn" onclick="openAddModal()">＋ Προσθήκη δόσης</button>
</div>

<button class="add-fab" onclick="openAddModal()" aria-label="Προσθήκη δόσης">＋</button>

<input type="file" id="json-file-input" accept=".json" style="display:none" onchange="handleJSONImport(event)">

<div id="toast" style="display:none;position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+80px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:200;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3)"></div>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
<div class="modal" id="modal-box">
  <div class="modal-handle"></div>
  <div class="modal-head">
    <h2 id="modal-title">Προσθήκη δόσης</h2>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div class="fg">
      <label>Τράπεζα</label>
      <select id="f-bank">
        <option value="">-- Επιλέξτε υπάρχουσα --</option>
      </select>
    </div>
    <div class="fg">
      <label>ή νέα τράπεζα</label>
      <input type="text" id="f-bank-new" placeholder="π.χ. Πειραιώς">
    </div>
    <div class="fg">
      <label>Κάρτα</label>
      <input type="text" id="f-card" placeholder="π.χ. Visa Platinum *1234">
    </div>
    <div class="fg-row">
      <div class="fg">
        <label>Κατάστημα</label>
        <input type="text" id="f-store" placeholder="π.χ. Πλαίσιο">
      </div>
      <div class="fg">
        <label>Προϊόν</label>
        <input type="text" id="f-product" placeholder="π.χ. Laptop">
      </div>
    </div>
    <div class="fg-row">
      <div class="fg">
        <label>Ποσό δόσης (€)</label>
        <input type="number" id="f-amt" step="0.01" placeholder="0.00" inputmode="decimal">
      </div>
      <div class="fg">
        <label>Σύνολο δόσεων</label>
        <input type="number" id="f-total" min="1" placeholder="12" inputmode="numeric">
      </div>
    </div>
    <div class="fg-row">
      <div class="fg">
        <label>Πληρωμένες δόσεις</label>
        <input type="number" id="f-paid" min="0" placeholder="0" inputmode="numeric">
      </div>
      <div class="fg">
        <label>Ημ/νία επόμενης δόσης</label>
        <input type="date" id="f-next">
      </div>
    </div>
  </div>
  <div class="modal-actions">
    <button class="btn" onclick="closeModal()">Ακύρωση</button>
    <button class="btn primary" onclick="saveInst()">Αποθήκευση</button>
  </div>
</div>
</div>

<script>
const COLORS=['#178BCA','#E24B4A','#1D9E75','#BA7517','#534AB7','#D4537E'];
const STORE_ICONS={'πλαίσιο':'🖥️','media':'📺','ikea':'🛋️','leroy':'🔨','kotsovolos':'📱','jumbo':'🧸','zara':'👗','ab':'🛒','sklavenitis':'🛒'};
function storeIcon(n){const k=n.toLowerCase();for(const[p,i] of Object.entries(STORE_ICONS))if(k.includes(p))return i;return'🏪'}

const fmt=n=>'€'+Number(n).toLocaleString('el-GR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=s=>{if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`};
function daysUntil(s){if(!s)return null;const n=new Date();n.setHours(0,0,0,0);const d=new Date(s);d.setHours(0,0,0,0);return Math.round((d-n)/86400000)}

const STORAGE_KEY='doseis-pwa-v1';
let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null')||{banks:{}};
let nextId=Math.max(100,...Object.values(data.banks).flatMap(b=>Object.values(b.cards).flat().map(i=>i.id||0)))+1;
let collapsed={};
let editTarget=null;

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}

function showToast(msg,ms=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.display='none',ms);
}

function exportJSON(){
  const payload={version:1,exportedAt:new Date().toISOString(),data};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  const now=new Date();
  a.href=URL.createObjectURL(blob);
  a.download=`doseis_backup_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(a.href);
  showToast('✅ Backup JSON αποθηκεύτηκε!');
}

function importJSON(){document.getElementById('json-file-input').click()}

function handleJSONImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      const imported=parsed.data||parsed; // support both wrapped & raw format
      if(!imported.banks)throw new Error('Μη έγκυρη μορφή αρχείου');
      if(!confirm(`Εισαγωγή δεδομένων από "${file.name}";\n\nΤα τρέχοντα δεδομένα θα αντικατασταθούν.`)){e.target.value='';return}
      data=imported;
      nextId=Math.max(100,...Object.values(data.banks).flatMap(b=>Object.values(b.cards).flat().map(i=>i.id||0)))+1;
      save();render();
      showToast('✅ Δεδομένα εισήχθησαν επιτυχώς!');
    }catch(err){
      alert('Σφάλμα εισαγωγής: '+err.message);
    }
    e.target.value='';
  };
  reader.readAsText(file);
}

function allInsts(){
  const a=[];
  Object.entries(data.banks).forEach(([b,bk])=>Object.entries(bk.cards).forEach(([c,ii])=>ii.forEach(i=>a.push({...i,bank:b,card:c}))));
  return a;
}

function renderSummary(){
  const all=allInsts();
  const remAmt=all.reduce((s,i)=>s+i.amt*(i.total-i.paid),0);
  const monthly=all.reduce((s,i)=>s+i.amt,0);
  const next=all.filter(i=>i.nextDate).sort((a,b)=>new Date(a.nextDate)-new Date(b.nextDate))[0];
  document.getElementById('inst-count').textContent=all.length+' ενεργές';
  document.getElementById('summary').innerHTML=`
    <div class="metric"><div class="metric-label">Συνολικό υπόλοιπο</div><div class="metric-value danger">${fmt(remAmt)}</div></div>
    <div class="metric"><div class="metric-label">Μηνιαία υποχρέωση</div><div class="metric-value info">${fmt(monthly)}</div></div>
    <div class="metric"><div class="metric-label">Ενεργές δόσεις</div><div class="metric-value">${all.length}</div><div class="metric-sub">${Object.keys(data.banks).length} τράπεζες</div></div>
    <div class="metric"><div class="metric-label">Επόμενη χρέωση</div><div class="metric-value" style="font-size:15px">${next?fmtD(next.nextDate):'—'}</div><div class="metric-sub">${next?next.bank:''}</div></div>`;
}

function dueBadge(dateStr){
  const d=daysUntil(dateStr);
  if(d===null)return'';
  if(d<0)return`<span class="badge danger">⚠ Ληξιπρόθεσμη</span>`;
  if(d===0)return`<span class="badge danger">Σήμερα!</span>`;
  if(d<=3)return`<span class="badge warn">σε ${d} μέρ.</span>`;
  if(d<=7)return`<span class="badge warn">σε ${d} μέρ.</span>`;
  return`<span class="badge ok">σε ${d} μέρ.</span>`;
}

function renderBanks(){
  const el=document.getElementById('banks');
  el.innerHTML='';
  if(!Object.keys(data.banks).length){el.innerHTML='<div class="empty">Δεν υπάρχουν δόσεις.<br>Πατήστε ＋ για να προσθέσετε.</div>';return}
  Object.entries(data.banks).forEach(([bn,bank])=>{
    const allI=Object.values(bank.cards).flat();
    const monthly=allI.reduce((s,i)=>s+i.amt,0);
    const rem=allI.reduce((s,i)=>s+i.amt*(i.total-i.paid),0);
    const isOpen=!collapsed[bn];
    const sec=document.createElement('div');
    sec.className='bank-card';
    let body='';
    if(isOpen){
      Object.entries(bank.cards).forEach(([cn,insts])=>{
        const cRem=insts.reduce((s,i)=>s+i.amt*(i.total-i.paid),0);
        body+=`<div class="card-section">
          <div class="card-head">
            <div class="card-head-name">💳 ${cn}</div>
            <div class="card-head-rem">${fmt(cRem)} υπόλοιπο</div>
          </div>`;
        insts.forEach(inst=>{
          const remI=inst.total-inst.paid;
          const remAmt=inst.amt*remI;
          const pct=Math.round(inst.paid/inst.total*100);
          const barC=pct>=80?'#1D9E75':pct>=40?'#BA7517':'#178BCA';
          body+=`<div class="inst-item">
            <div class="inst-icon">${storeIcon(inst.store)}</div>
            <div class="inst-main">
              <div class="inst-store">${inst.store}</div>
              <div class="inst-product">${inst.product}</div>
              <div class="inst-row">
                <div>
                  <div style="font-size:11px;color:var(--text3)">Δόση / μήνα</div>
                  <div class="inst-amt">${fmt(inst.amt)}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:11px;color:var(--text3)">Υπόλοιπο</div>
                  <div style="font-size:16px;font-weight:600;color:var(--text)">${fmt(remAmt)}</div>
                </div>
              </div>
              <div class="inst-meta">
                <span class="badge info">${remI} από ${inst.total} δόσεις</span>
                <span class="badge info">📅 ${fmtD(inst.nextDate)}</span>
                ${dueBadge(inst.nextDate)}
              </div>
              <div class="prog-wrap">
                <div class="prog-label"><span>Εξόφληση</span><span>${pct}%</span></div>
                <div class="prog"><div class="prog-fill" style="width:${pct}%;background:${barC}"></div></div>
              </div>
            </div>
            <div class="inst-actions">
              <button class="icon-btn" onclick="editInst('${bn}','${cn}',${inst.id})" title="Επεξεργασία">✏️</button>
              <button class="icon-btn del" onclick="deleteInst('${bn}','${cn}',${inst.id})" title="Διαγραφή">🗑</button>
            </div>
          </div>`;
        });
        body+=`<button class="card-add-btn" onclick="openAddModal('${bn}','${cn}')">＋ Δόση σε αυτή την κάρτα</button>
        </div>`;
      });
    }
    sec.innerHTML=`
      <div class="bank-head" onclick="toggleBank('${bn}')">
        <div class="bank-dot" style="background:${bank.color}"></div>
        <div class="bank-info">
          <div class="bank-name">${bn}</div>
          <div class="bank-sub">${allI.length} δόση${allI.length!==1?'ς':''} · ${Object.keys(bank.cards).length} κάρτα${Object.keys(bank.cards).length!==1?'ες':''}</div>
        </div>
        <div class="bank-totals">
          <div class="bank-tot-val danger">${fmt(rem)}</div>
          <div class="bank-tot-label">υπόλοιπο</div>
          <div class="bank-tot-val" style="font-size:12px">${fmt(monthly)}/μήνα</div>
        </div>
        <div class="chevron ${isOpen?'open':''}">▼</div>
      </div>
      ${isOpen?`<div class="bank-body">${body}</div>`:''}`;
    el.appendChild(sec);
  });
}

function toggleBank(n){collapsed[n]=!collapsed[n];renderBanks()}

function populateBankSel(pre=''){
  const s=document.getElementById('f-bank');
  s.innerHTML='<option value="">-- Επιλέξτε υπάρχουσα --</option>';
  Object.keys(data.banks).forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=b;if(b===pre)o.selected=true;s.appendChild(o)});
}

function openAddModal(pb='',pc=''){
  editTarget=null;
  document.getElementById('modal-title').textContent='Προσθήκη δόσης';
  populateBankSel(pb);
  document.getElementById('f-bank-new').value='';
  document.getElementById('f-card').value=pc;
  document.getElementById('f-store').value='';
  document.getElementById('f-product').value='';
  document.getElementById('f-amt').value='';
  document.getElementById('f-total').value='';
  document.getElementById('f-paid').value='0';
  const nd=new Date();nd.setMonth(nd.getMonth()+1);
  document.getElementById('f-next').value=nd.toISOString().split('T')[0];
  document.getElementById('overlay').classList.add('open');
}

function editInst(bn,cn,id){
  const inst=data.banks[bn].cards[cn].find(i=>i.id===id);
  editTarget={bn,cn,id};
  document.getElementById('modal-title').textContent='Επεξεργασία δόσης';
  populateBankSel(bn);
  document.getElementById('f-bank-new').value='';
  document.getElementById('f-card').value=cn;
  document.getElementById('f-store').value=inst.store;
  document.getElementById('f-product').value=inst.product;
  document.getElementById('f-amt').value=inst.amt;
  document.getElementById('f-total').value=inst.total;
  document.getElementById('f-paid').value=inst.paid;
  document.getElementById('f-next').value=inst.nextDate||'';
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){document.getElementById('overlay').classList.remove('open')}
function handleOverlayClick(e){if(e.target===document.getElementById('overlay'))closeModal()}

function saveInst(){
  const nb=document.getElementById('f-bank-new').value.trim();
  let bn=nb||document.getElementById('f-bank').value;
  if(!bn){alert('Επιλέξτε ή εισάγετε τράπεζα');return}
  const cn=document.getElementById('f-card').value.trim()||'Κάρτα';
  const store=document.getElementById('f-store').value.trim();
  const product=document.getElementById('f-product').value.trim();
  const amt=parseFloat(document.getElementById('f-amt').value)||0;
  const total=parseInt(document.getElementById('f-total').value)||1;
  const paid=parseInt(document.getElementById('f-paid').value)||0;
  const nextDate=document.getElementById('f-next').value;
  if(!store||!product||!amt){alert('Συμπληρώστε κατάστημα, προϊόν και ποσό δόσης');return}
  if(!data.banks[bn]){const ci=Object.keys(data.banks).length;data.banks[bn]={color:COLORS[ci%COLORS.length],cards:{}}}
  if(!data.banks[bn].cards[cn])data.banks[bn].cards[cn]=[];
  if(editTarget){
    const arr=data.banks[editTarget.bn].cards[editTarget.cn];
    const idx=arr.findIndex(i=>i.id===editTarget.id);
    if(editTarget.bn!==bn||editTarget.cn!==cn){
      arr.splice(idx,1);
      if(!arr.length)delete data.banks[editTarget.bn].cards[editTarget.cn];
      if(!Object.keys(data.banks[editTarget.bn].cards).length)delete data.banks[editTarget.bn];
      data.banks[bn].cards[cn].push({id:editTarget.id,store,product,amt,total,paid,nextDate});
    } else arr[idx]={id:editTarget.id,store,product,amt,total,paid,nextDate};
  } else {
    data.banks[bn].cards[cn].push({id:nextId++,store,product,amt,total,paid,nextDate});
  }
  save();closeModal();render();
}

function deleteInst(bn,cn,id){
  if(!confirm('Διαγραφή δόσης;'))return;
  const arr=data.banks[bn].cards[cn];
  arr.splice(arr.findIndex(i=>i.id===id),1);
  if(!arr.length)delete data.banks[bn].cards[cn];
  if(!Object.keys(data.banks[bn].cards).length)delete data.banks[bn];
  save();render();
}

function render(){renderSummary();renderBanks()}

function exportExcel(){
  if(typeof XLSX==='undefined'){
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload=()=>doExport();
    document.head.appendChild(s);
  } else doExport();
}

function doExport(){
  const wb=XLSX.utils.book_new();
  const fmtN=n=>parseFloat(Number(n).toFixed(2));
  const fmtDx=s=>{if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`};

  const summaryRows=[['Τράπεζα','Κάρτα','Κατάστημα','Προϊόν','Δόση (€)','Σύνολο Δόσεων','Πληρωμένες','Υπολοιπόμενες','Υπόλοιπο Ποσό (€)','Επόμενη Δόση']];
  Object.entries(data.banks).forEach(([bn,bank])=>{
    Object.entries(bank.cards).forEach(([cn,insts])=>{
      insts.forEach(i=>{
        const rem=i.total-i.paid;
        summaryRows.push([bn,cn,i.store,i.product,fmtN(i.amt),i.total,i.paid,rem,fmtN(i.amt*rem),fmtDx(i.nextDate)]);
      });
    });
  });
  const all=allInsts();
  summaryRows.push([]);
  summaryRows.push(['','','','','Μηνιαία υποχρέωση:',fmtN(all.reduce((s,i)=>s+i.amt,0)),'','Συνολικό υπόλοιπο:',fmtN(all.reduce((s,i)=>s+i.amt*(i.total-i.paid),0)),'']);

  const ws=XLSX.utils.aoa_to_sheet(summaryRows);
  ws['!cols']=[{wch:16},{wch:22},{wch:16},{wch:20},{wch:12},{wch:14},{wch:12},{wch:14},{wch:18},{wch:14}];

  const hStyle={font:{bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'178BCA'}},alignment:{horizontal:'center'}};
  ['A1','B1','C1','D1','E1','F1','G1','H1','I1','J1'].forEach(c=>{if(ws[c])ws[c].s=hStyle});

  Object.entries(data.banks).forEach(([bn,bank])=>{
    const bankInsts=Object.values(bank.cards).flat();
    const bRows=[['Κατάστημα','Προϊόν','Κάρτα','Δόση (€)','Σύνολο','Πληρωμένες','Υπολοιπόμενες','Υπόλοιπο (€)','Επόμενη Δόση']];
    bankInsts.forEach(i=>{
      const cn=Object.entries(bank.cards).find(([,ii])=>ii.some(x=>x.id===i.id))[0];
      bRows.push([i.store,i.product,cn,fmtN(i.amt),i.total,i.paid,i.total-i.paid,fmtN(i.amt*(i.total-i.paid)),fmtDx(i.nextDate)]);
    });
    bRows.push([]);
    bRows.push(['Μηνιαία:',fmtN(bankInsts.reduce((s,i)=>s+i.amt,0)),'Υπόλοιπο:',fmtN(bankInsts.reduce((s,i)=>s+i.amt*(i.total-i.paid),0))]);
    const bws=XLSX.utils.aoa_to_sheet(bRows);
    bws['!cols']=[{wch:16},{wch:20},{wch:22},{wch:12},{wch:10},{wch:12},{wch:14},{wch:16},{wch:14}];
    XLSX.utils.book_append_sheet(wb,bws,bn.substring(0,31));
  });

  XLSX.utils.book_append_sheet(wb,ws,'Σύνοψη',true);
  wb.SheetNames.unshift(wb.SheetNames.pop());

  const now=new Date();
  const fname=`doseis_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb,fname);
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

render();
</script>
